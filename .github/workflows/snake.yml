name: Generate Snake & Pacman Animation

on:
  schedule:
    - cron: "0 */6 * * *" # Runs every 6 hours
  workflow_dispatch: # Allows manual trigger
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # Snake animation - Green snake eating contributions
      - name: Generate Green Snake SVG
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Pacman-style contribution graph
      - name: Generate Pacman Contribution Graph
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/pacman-contribution-graph.svg?color_snake=#ffff00&color_dots=#00ff00,#006d32,#26a641,#39d353,#00b4d8
            dist/pacman-contribution-graph-dark.svg?palette=github-dark&color_snake=#ffff00&color_dots=#06d6a0,#006d32,#26a641,#39d353,#00b4d8
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Push generated files to output branch
      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
